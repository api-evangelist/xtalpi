aid: xtalpi
name: XtalPi
description: >-
  XtalPi is an AI-and-quantum-physics drug discovery and materials research
  platform company with headquarters in Cambridge, Massachusetts and major
  operations in Beijing, Shanghai, and Shenzhen, publicly listed on the Hong
  Kong Stock Exchange under stock code 2228.HK. The company combines a hybrid
  AI plus quantum mechanics (QM) discovery engine with large-scale robotic
  laboratory automation to accelerate molecular research and development for
  pharmaceutical, agrochemical, and materials customers, including engagements
  with Pfizer, Eli Lilly, and Novartis. XtalPi's offering spans proprietary
  software platforms — PatSight for patent extraction, XFEP for free-energy
  perturbation binding-affinity prediction, XMolGen for generative chemistry,
  and XtalGazer for solid-state research — and intelligent automation hardware
  including the XmartChem intelligent synthesis workstation and ChemPlus
  desktop solid dispenser. Its drug discovery services cover hit discovery,
  hit/lead optimization, biology capabilities, focused library synthesis, and
  the PepiX peptide platform, complemented by sister brands Ailux (biology)
  and AiFChem (chemistry). XtalPi's products are delivered as enterprise
  collaborations, licensed software, and CRO-style services; there is no
  public developer API, SDK, or open-source release.
